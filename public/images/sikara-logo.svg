<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <linearGradient id="blueG" x1="10%" y1="100%" x2="90%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenG" x1="90%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="circleG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Blue upper arc: lower-left → curves up → upper-right with arrowhead -->
  <path d="M 32 195 C 8 155, 12 105, 50 78 C 78 57, 115 54, 138 40"
        stroke="url(#blueG)" stroke-width="26" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead pointing upper-right -->
  <polygon points="148,14 170,42 136,44" fill="#2563EB"/>

  <!-- Person/student dark circle in center -->
  <circle cx="92" cy="112" r="21" fill="url(#circleG)"/>

  <!-- Green lower swoosh: center-bottom → sweeps down-left → curves right -->
  <path d="M 108 146 C 135 166, 155 180, 158 205 C 160 222, 138 232, 110 230 C 78 228, 48 212, 34 192"
        stroke="url(#greenG)" stroke-width="26" stroke-linecap="round" fill="none"/>
</svg>
